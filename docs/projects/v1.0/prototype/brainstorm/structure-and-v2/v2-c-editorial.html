<title>C · 编辑杂志 · V2 Liquid Glass 对比页</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  }
  .stage { width: 100vw; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

<body>
<div class="label">C · 编辑杂志 · 1280×800</div>
<div class="stage">
<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="800" fill="#f4f1ea"/>
  <g font-family="Georgia, 'Times New Roman', serif" fill="#1a1a1a">
    <text x="80" y="100" font-size="11" letter-spacing="4" fill="#a8322a">VOL. 01 — 14 JUNE 2026</text>
    <text x="80" y="200" font-size="64" font-weight="700" letter-spacing="-2">A Footnote,</text>
    <text x="80" y="270" font-size="64" font-weight="300" font-style="italic" opacity=".75">not a monument.</text>
    <line x1="80" y1="310" x2="280" y2="310" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="80" y="350" font-size="14" opacity=".85">脚手架已经立起。这一篇，写给会回来</text>
    <text x="80" y="372" font-size="14" opacity=".85">翻看自己的人。V1.0 启动中，UI 先于数据。</text>
  </g>
  <g font-family="Georgia, serif" font-size="13" fill="#1a1a1a" opacity=".85">
    <text x="80" y="440">Davenport 写于 2017 年的那篇《Why I Write》说：写作不是</text>
    <text x="80" y="462">为了被读，是为了看清自己。Mindtap 想做的事更窄——</text>
    <text x="80" y="484">不是公开，是私下的；不是文章，是脚注。</text>
    <text x="80" y="524" font-style="italic">一条灵感，一段打卡，一句备忘。</text>
    <text x="80" y="546" font-style="italic">不写完也允许，不发布也允许。</text>
    <text x="80" y="586">UI 的玻璃层只承接控件，不承接内容。内容是纸，</text>
    <text x="80" y="608">是有肌理的，是会旧的。控件是干净的、漂浮的、</text>
    <text x="80" y="630">会被操作系统本身重新绘制的——你不应与之争夺。</text>
  </g>
  <g font-family="Georgia, serif" fill="#1a1a1a">
    <line x1="780" y1="120" x2="780" y2="700" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <text x="820" y="160" font-size="36" font-style="italic" opacity=".5">"</text>
    <text x="820" y="220" font-size="20" font-style="italic" opacity=".7">In 1998, Winer wrote —</text>
    <text x="820" y="250" font-size="20" font-style="italic" opacity=".7">a record is a structure</text>
    <text x="820" y="280" font-size="20" font-style="italic" opacity=".7">meant to outlast the moment</text>
    <text x="820" y="310" font-size="20" font-style="italic" opacity=".7">of its writing.</text>
    <text x="820" y="350" font-size="13" opacity=".55" font-style="italic">— Dave Winer, Scripting News</text>
    <text x="820" y="430" font-size="10" letter-spacing="3" fill="#a8322a">FURTHER READING</text>
    <line x1="820" y1="445" x2="940" y2="445" stroke="#a8322a" stroke-width="1"/>
    <g font-size="14">
      <text x="820" y="478" font-weight="600">Apple HIG · Materials</text>
      <text x="820" y="498" font-size="11" opacity=".55">developer.apple.com</text>
      <text x="820" y="540" font-weight="600">Apple · Landmarks (Sample)</text>
      <text x="820" y="560" font-size="11" opacity=".55">SwiftUI · iOS 26+</text>
      <text x="820" y="602" font-weight="600">Adopting Liquid Glass</text>
      <text x="820" y="622" font-size="11" opacity=".55">developer.apple.com</text>
    </g>
    <text x="820" y="700" font-size="9" letter-spacing="3" opacity=".4">FOLIO 01 ────── ARCHIVE OPEN</text>
  </g>
  <rect x="0" y="0" width="1280" height="72" fill="rgba(255,255,255,0.55)"/>
  <line x1="0" y1="72" x2="1280" y2="72" stroke="rgba(0,0,0,0.08)"/>
  <g font-family="Georgia, serif">
    <text x="80" y="46" font-size="20" font-weight="700">轻念</text>
    <text x="160" y="46" font-size="13" opacity=".55">Mindtap</text>
    <g font-size="14">
      <text x="700" y="46" opacity=".75">目录</text>
      <text x="780" y="46" opacity=".75">记录</text>
      <text x="860" y="46" opacity=".75">归档</text>
      <text x="940" y="46" opacity=".95" font-weight="700">设置</text>
      <line x1="930" y1="56" x2="970" y2="56" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
    <rect x="1080" y="22" width="160" height="28" rx="14" fill="rgba(255,255,255,0.6)" stroke="rgba(0,0,0,0.12)"/>
    <text x="1095" y="40" font-size="11" font-style="italic" opacity=".5">搜一搜… ⌘K</text>
  </g>
  <circle cx="1180" cy="720" r="38" fill="rgba(255,255,255,0.7)" stroke="rgba(0,0,0,0.18)" stroke-width="1.5"/>
  <text x="1180" y="732" font-family="Georgia, serif" font-size="32" text-anchor="middle" fill="#1a1a1a">+</text>
  <g font-family="Georgia, serif" font-size="11" fill="#1a1a1a" opacity=".5">
    <text x="80" y="760">P. 01 / 04</text>
    <text x="1200" y="760" text-anchor="end">—— 续</text>
  </g>
</svg>
</div>
